name: CI/CD Pipeline for Node App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted  

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/node-k8s-app1:latest

      - name: Update Kubernetes Cluster
        run: |
          kubectl set image deployment/node-deployment node-container=${{ secrets.DOCKER_USERNAME }}/node-k8s-app1:latest
          kubectl rollout status deployment/node-deployment
