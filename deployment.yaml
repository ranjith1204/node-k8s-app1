apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: node

  template:
    metadata:
      labels:
        app: node

    spec:
      containers:
      - name: node-container
        image: ranjith1204/node-k8s-app
        ports:
        - containerPort: 3000
